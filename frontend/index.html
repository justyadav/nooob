<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Discord Bot Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>🛠️ Admin Dashboard</h1>
        
        <div id="auth-section">
            <button id="login-btn" onclick="login()">Login with Discord</button>
        </div>

        <div id="dashboard-section" style="display: none;">
            <h2>Select a Server You Manage</h2>
            <div id="guilds-list">Loading servers...</div>
            <hr>
            <h2>Manage Selected Server</h2>
            <form id="config-form">
                <label>Custom Welcome Message:</label><br>
                <textarea id="welcome-msg" rows="4" cols="50"></textarea><br><br>
                <button type="submit">Save Changes</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = "https://enderbot-wyog.onrender.com";
        let accessToken = null;
        let selectedGuildId = null;

        function login() {
            window.location.href = `${API_URL}/api/auth/login`;
        }

        // Extract token from URL after redirect
        const urlParams = new URLSearchParams(window.location.search);
        accessToken = urlParams.get('token');

        if (accessToken) {
            document.getElementById('auth-section').style.display = 'none';
            document.getElementById('dashboard-section').style.display = 'block';
            fetchAdminGuilds();
        }

        async function fetchAdminGuilds() {
            const res = await fetch(`${API_URL}/api/auth/user-guilds?token=${accessToken}`);
            if (res.status === 401) {
                alert("Session expired. Please log in again.");
                return login();
            }
            const data = await res.json();
            const listDiv = document.getElementById('guilds-list');
            
            listDiv.innerHTML = data.guilds.map(g => `
                <div class="guild-card ${g.bot_in_guild ? 'active' : 'inactive'}" onclick="selectGuild('${g.id}', ${g.bot_in_guild})">
                    <img src="${g.icon || 'https://via.placeholder.com/50'}" width="50" style="border-radius:50%;">
                    <strong>${g.name}</strong>
                    <p>${g.bot_in_guild ? '✅ Bot present' : '❌ Bot missing (Click to invite)'}</p>
                </div>
            `).join('');
        }

        function selectGuild(guildId, botInGuild) {
            if (!botInGuild) {
                // Redirect user to invite bot to this specific guild if missing
                window.open(`https://discord.com/oauth2/authorize?client_id=YOUR_CLIENT_ID&permissions=8&scope=bot%20applications.commands&guild_id=${guildId}`);
                return;
            }
            selectedGuildId = guildId;
            alert(`Selected Server ID: ${guildId}`);
        }

        // Save Configuration
        document.getElementById('config-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            if (!selectedGuildId) return alert("Please select a server first!");
            
            const welcomeMessage = document.getElementById('welcome-msg').value;
            const res = await fetch(`${API_URL}/api/guild/${selectedGuildId}/config`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ welcome_message: welcomeMessage })
            });
            const result = await res.json();
            alert(result.message);
        });
    </script>
</body>
</html>
